# companies.yaml — watchlist from your Google Drive "Next Steps" sheet
# ("Potential Companies", tiered 1-3), pulled + live-resolved 2026-06-03.
#
# All ats/slug verified live. Supported sources: Greenhouse, Lever, Ashby, Workable,
# SmartRecruiters (api.smartrecruiters.com), and Workday (needs dc + site). NVIDIA now
# resolves via Workday. Still UNRESOLVED (commented inline, with reasons): Apple, EA,
# Pixar, Google/YouTube, TCG.
#
# Tip: if you consider this watchlist private, add companies.yaml to .gitignore.

companies:
  # --- Tier 1 ---
  # Netflix: the Lever board is dead (0 roles); real careers feed is the Eightfold API
  # at explore.jobs.netflix.net. Netflix is all media/entertainment, so query by function.
  - name: Netflix
    ats: netflix
    queries:
      - "strategy"
      - "operations"
      - "business development"
      - "partnerships"
      - "corporate development"
      - "content strategy"
  - name: Roblox
    ats: greenhouse
    slug: roblox
  - name: Discord
    ats: greenhouse
    slug: discord
  - name: "a16z (Games Fund)"  # resolves to the a16z Greenhouse board (whole firm)
    ats: greenhouse
    slug: a16z
  - name: Epic Games
    ats: greenhouse
    slug: epicgames
  # Apple — no public ATS. Apple's search went client-side (~Jul 2026) so text queries
  # are ignored server-side; the `apple` source now CRAWLS the newest-first US list
  # (~240 newest roles per run) and filters to M&E business titles locally.
  - name: "Apple (Media & Entertainment)"
    ats: apple

  # --- Tier 2 ---
  - name: Spotify
    ats: lever
    slug: spotify
  - name: OpenAI
    ats: ashby
    slug: openai
  - name: Anthropic
    ats: greenhouse
    slug: anthropic
  - name: Reddit
    ats: greenhouse
    slug: reddit
  - name: Roku
    ats: greenhouse
    slug: roku
  # EA — UNRESOLVED: not on SmartRecruiters under ElectronicArts/EA (API returns 0;
  #   source verified working via Bosch=4601, Visa=10). Appears to use a private ATS now.
  # TCG (The Chernin Group) — UNRESOLVED: no public ATS board found (small VC).
  # Pixar — UNRESOLVED: no standalone board; roles live on Disney's Workday
  #   (disney/wd5/disneycareer, verified). Add a "Disney" workday entry for that pipeline.
  # YouTube / Google — no public ATS; added below via the custom `google` source,
  #   scoped to YouTube / media roles (scrapes the public careers results page).

  # --- Tier 3 ---
  - name: Substack
    ats: ashby
    slug: substack
  - name: "Crunchyroll (Sony)"
    ats: greenhouse
    slug: crunchyroll
  - name: NVIDIA
    ats: workday
    slug: nvidia
    dc: wd5
    site: NVIDIAExternalCareerSite
  - name: "Patreon"
    ats: ashby
    slug: patreon
  - name: "Jam City"
    ats: lever
    slug: jamcity
  - name: "Kabam"
    ats: lever
    slug: kabam
  - name: "Scopely"
    ats: greenhouse
    slug: scopely
  - name: "MasterClass"
    ats: greenhouse
    slug: masterclass
  - name: "Twitch Interactive"
    ats: greenhouse
    slug: twitch
  # Google — custom source; queries combine media/YouTube context with the CORE
  # functions (strategy, ops, BD, partnerships, corp dev) so the search itself is
  # function-targeted; triage + deep scoring then keep only genuine fits.
  - name: "Google (YouTube / Media)"
    ats: google
    queries:
      - "YouTube strategy and operations"
      - "YouTube partnerships"
      - "YouTube business development"
      - "YouTube corporate development"
      - "Google News partnerships"
      - "media partnerships"
      - "media strategy and operations"
      - "content partnerships"
  # Unity — left Greenhouse (unity3d/unity both 404, verified 2026-07-06); careers site
  # is a JS app with no reachable public feed. Kept as `auto` so the resolver re-probes
  # every run and the Watchlist-health tracker shows it honestly.
  - name: "Unity Technologies"
    ats: auto
  # EA — no public ATS feed; careers.ea.com is Phenom behind Cloudflare (widget API 403s
  # non-browser calls, verified 2026-07-08). Kept as `auto` — tracked, re-probed every run.
  - name: "Electronic Arts (EA)"
    ats: auto
  - name: "Digital Eclipse"
    ats: greenhouse
    slug: digitaleclipse
  # Ubisoft hires through SmartRecruiters company-wide ("Ubisoft2", verified 214 roles);
  # the location filter keeps SF Bay Area / US-remote ones.
  - name: "Ubisoft San Francisco"
    ats: smartrecruiters
    slug: Ubisoft2
  # Snap — custom `snap` source (careers.snap.com JSON API; Workday-backed).
  - name: "Snap Inc."
    ats: snap
  # Whatnot disabled Ashby's public posting API, but their hosted board still answers
  # the public GraphQL endpoint (130 postings, verified 2026-07-08) — the ashby source
  # falls back to it automatically.
  - name: "Whatnot"
    ats: ashby
    slug: whatnot
  - name: "Fandom (formerly Wikia)"
    ats: greenhouse
    slug: fandom
  # Linktree's Workable account is live but currently lists 0 openings — pinned so
  # roles flow in the moment they post.
  - name: "Linktree"
    ats: workable
    slug: linktree
  # Overtime — careers page is a JS app with no reachable feed (JazzHR page is parked).
  - name: "Overtime"
    ats: auto
  - name: "Podcastle"
    ats: bamboohr
    slug: podcastle
  - name: "Strava"
    ats: ashby
    slug: strava
  - name: "Backbone"
    ats: ashby
    slug: backbone
  - name: "Beacons"
    ats: ashby
    slug: beacons
  # CAUGHT 2026-07-08: greenhouse:thrive is a DIFFERENT company ("THRIVE"), not Thrive
  # Fantasy — auto-resolve guessed wrong (resolver now has an ownership gate for this).
  # No real board found (site 403s; may be defunct).
  - name: "Thrive Fantasy"
    ats: auto
  # Audiomack — no careers feed found (audiomack.com/jobs is music content, not jobs).
  - name: "Audiomack"
    ats: auto
  - name: "Niantic Spatial"
    ats: ashby
    slug: niantic-spatial
  # UnitedMasters' own careers page embeds this Greenhouse board (verified 2026-07-08).
  - name: "UnitedMasters"
    ats: greenhouse
    slug: unitedmasterstranslation

  # --- User-requested 2026-07-08 ---
  # PlayStation = Sony Interactive Entertainment's global Greenhouse board (187 roles).
  - name: "PlayStation"
    ats: greenhouse
    slug: sonyinteractiveentertainmentglobal
  - name: "Inkitt"
    ats: lever
    slug: inkitt

# companies.yaml — watchlist from your Google Drive "Next Steps" sheet
# ("Potential Companies", tiered 1-3), pulled + live-resolved 2026-06-03.
#
# All ats/slug verified live. Supported sources: Greenhouse, Lever, Ashby, Workable,
# SmartRecruiters (api.smartrecruiters.com), and Workday (needs dc + site). NVIDIA now
# resolves via Workday. Still UNRESOLVED (commented inline, with reasons): Apple, EA,
# Pixar, Google/YouTube, TCG.
#
# Tip: if you consider this watchlist private, add companies.yaml to .gitignore.

companies:
  # --- Tier 1 ---
  - name: Netflix              # Lever board exists; 0 open roles at pull time
    ats: lever
    slug: netflix
  - name: Roblox
    ats: greenhouse
    slug: roblox
  - name: Discord
    ats: greenhouse
    slug: discord
  - name: "a16z (Games Fund)"  # resolves to the a16z Greenhouse board (whole firm)
    ats: greenhouse
    slug: a16z
  - name: Epic Games
    ats: greenhouse
    slug: epicgames
  # Apple — UNRESOLVED: jobs.apple.com is custom; Workday probe returned 401. No public feed.

  # --- Tier 2 ---
  - name: Spotify
    ats: lever
    slug: spotify
  - name: OpenAI
    ats: ashby
    slug: openai
  - name: Anthropic
    ats: greenhouse
    slug: anthropic
  - name: Reddit
    ats: greenhouse
    slug: reddit
  - name: Roku
    ats: greenhouse
    slug: roku
  # EA — UNRESOLVED: not on SmartRecruiters under ElectronicArts/EA (API returns 0;
  #   source verified working via Bosch=4601, Visa=10). Appears to use a private ATS now.
  # TCG (The Chernin Group) — UNRESOLVED: no public ATS board found (small VC).
  # Pixar — UNRESOLVED: no standalone board; roles live on Disney's Workday
  #   (disney/wd5/disneycareer, verified). Add a "Disney" workday entry for that pipeline.
  # YouTube / Google — no public ATS; added below via the custom `google` source,
  #   scoped to YouTube / media roles (scrapes the public careers results page).

  # --- Tier 3 ---
  - name: Substack
    ats: ashby
    slug: substack
  - name: "Crunchyroll (Sony)"
    ats: greenhouse
    slug: crunchyroll
  - name: NVIDIA
    ats: workday
    slug: nvidia
    dc: wd5
    site: NVIDIAExternalCareerSite
  - name: "Patreon"
    ats: ashby
    slug: patreon
  - name: "Jam City"
    ats: lever
    slug: jamcity
  - name: "Kabam"
    ats: lever
    slug: kabam
  - name: "Scopely"
    ats: greenhouse
    slug: scopely
  - name: "MasterClass"
    ats: greenhouse
    slug: masterclass
  - name: "Twitch Interactive"
    ats: greenhouse
    slug: twitch
  # Google — custom source; queries combine media/YouTube context with the CORE
  # functions (strategy, ops, BD, partnerships, corp dev) so the search itself is
  # function-targeted; triage + deep scoring then keep only genuine fits.
  - name: "Google (YouTube / Media)"
    ats: google
    queries:
      - "YouTube strategy and operations"
      - "YouTube partnerships"
      - "YouTube business development"
      - "YouTube corporate development"
      - "Google News partnerships"
      - "media partnerships"
      - "media strategy and operations"
      - "content partnerships"
  - name: "Unity Technologies"
    ats: greenhouse
    slug: unity
  - name: "Electronic Arts (EA)"
    ats: greenhouse
    slug: EA

# companies.yaml — watchlist from your Google Drive "Next Steps" sheet
# ("Potential Companies", tiered 1-3), pulled + live-resolved 2026-06-03.
#
# All ats/slug verified live. Supported sources: Greenhouse, Lever, Ashby, Workable,
# SmartRecruiters (api.smartrecruiters.com), and Workday (needs dc + site). NVIDIA now
# resolves via Workday. Still UNRESOLVED (commented inline, with reasons): Apple, EA,
# Pixar, Google/YouTube, TCG.
#
# Tip: if you consider this watchlist private, add companies.yaml to .gitignore.

companies:
  # --- Tier 1 ---
  # Netflix: the Lever board is dead (0 roles); real careers feed is the Eightfold API
  # at explore.jobs.netflix.net. Netflix is all media/entertainment, so query by function.
  - name: Netflix
    ats: netflix
    queries:
      - "strategy"
      - "operations"
      - "business development"
      - "partnerships"
      - "corporate development"
      - "content strategy"
  - name: Roblox
    ats: greenhouse
    slug: roblox
  - name: Discord
    ats: greenhouse
    slug: discord
  - name: "a16z (Games Fund)"  # resolves to the a16z Greenhouse board (whole firm)
    ats: greenhouse
    slug: a16z
  - name: Epic Games
    ats: greenhouse
    slug: epicgames
  # Apple — no public ATS; custom `apple` source scrapes jobs.apple.com search results,
  # scoped to Media & Entertainment divisions (TV+, Music, Podcasts, News, Books, Arcade,
  # Sports, Beats). Drops retail/eng at source; deep scoring keeps core-function fits.
  - name: "Apple (Media & Entertainment)"
    ats: apple
    queries:
      - "Apple TV"
      - "Apple Music"
      - "Apple Podcasts"
      - "Apple News"
      - "Apple Sports"
      - "content partnerships"
      - "business affairs"
      - "media partnerships"

  # --- Tier 2 ---
  - name: Spotify
    ats: lever
    slug: spotify
  - name: OpenAI
    ats: ashby
    slug: openai
  - name: Anthropic
    ats: greenhouse
    slug: anthropic
  - name: Reddit
    ats: greenhouse
    slug: reddit
  - name: Roku
    ats: greenhouse
    slug: roku
  # EA — UNRESOLVED: not on SmartRecruiters under ElectronicArts/EA (API returns 0;
  #   source verified working via Bosch=4601, Visa=10). Appears to use a private ATS now.
  # TCG (The Chernin Group) — UNRESOLVED: no public ATS board found (small VC).
  # Pixar — UNRESOLVED: no standalone board; roles live on Disney's Workday
  #   (disney/wd5/disneycareer, verified). Add a "Disney" workday entry for that pipeline.
  # YouTube / Google — no public ATS; added below via the custom `google` source,
  #   scoped to YouTube / media roles (scrapes the public careers results page).

  # --- Tier 3 ---
  - name: Substack
    ats: ashby
    slug: substack
  - name: "Crunchyroll (Sony)"
    ats: greenhouse
    slug: crunchyroll
  - name: NVIDIA
    ats: workday
    slug: nvidia
    dc: wd5
    site: NVIDIAExternalCareerSite
  - name: "Patreon"
    ats: ashby
    slug: patreon
  - name: "Jam City"
    ats: lever
    slug: jamcity
  - name: "Kabam"
    ats: lever
    slug: kabam
  - name: "Scopely"
    ats: greenhouse
    slug: scopely
  - name: "MasterClass"
    ats: greenhouse
    slug: masterclass
  - name: "Twitch Interactive"
    ats: greenhouse
    slug: twitch
  # Google — custom source; queries combine media/YouTube context with the CORE
  # functions (strategy, ops, BD, partnerships, corp dev) so the search itself is
  # function-targeted; triage + deep scoring then keep only genuine fits.
  - name: "Google (YouTube / Media)"
    ats: google
    queries:
      - "YouTube strategy and operations"
      - "YouTube partnerships"
      - "YouTube business development"
      - "YouTube corporate development"
      - "Google News partnerships"
      - "media partnerships"
      - "media strategy and operations"
      - "content partnerships"
  - name: "Unity Technologies"
    ats: greenhouse
    slug: unity3d              # NB: the board slug is "unity3d", not "unity" (which 404s)
  # Electronic Arts (EA) — no public ATS feed (greenhouse/lever/ashby/workday/SmartRecruiters
  # all 404/empty); ea.com/careers is a custom site. Would need a dedicated scraper like
  # Apple/Google. Commented out so it doesn't error every run; re-add if a feed is built.
  # - name: "Electronic Arts (EA)"
  #   ats: greenhouse
  #   slug: EA
